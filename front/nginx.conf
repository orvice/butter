server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed asset bundles get long-lived cache; everything else stays fresh.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every unknown path serves the React app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Strip the index from caches so deploys roll out immediately.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Lightweight readiness probe.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
