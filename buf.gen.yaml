version: v2
plugins:
  - remote: buf.build/grpc/go
    out: pkg/proto
    opt: paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway:v2.19.0
    out: pkg/proto
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.18.1
    out: pkg/proto 
    opt:
      - paths=source_relative
  - remote: buf.build/protocolbuffers/go:v1.34.1
    out: pkg/proto
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/validate-go
    out: pkg/proto
    opt:
      - paths=source_relative
  - local: protoc-gen-twirp
    out: pkg/proto
    opt:
      - paths=source_relative
  # bufbuild/es v2 already emits service descriptors (GenService<...>)
  # alongside message types. @connectrpc/connect v2 consumes those
  # descriptors directly, so we do NOT need a separate connect-es plugin.
  - remote: buf.build/bufbuild/es:v2.4.0
    out: front/src/gen
    include_imports: true
    opt:
      - target=ts
      - import_extension=none