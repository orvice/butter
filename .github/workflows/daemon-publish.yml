name: Docker (daemon)

# Builds cmd/butter-daemon from cmd/butter-daemon/Dockerfile and publishes a
# separate worker image to ghcr.io/<owner>/<repo>-daemon.

on:
  schedule:
    - cron: '17 22 * * *'
  push:
    branches: [ "**" ]
    tags: [ 'v*.*.*' ]
    paths:
      - 'cmd/butter-daemon/**'
      - 'pkg/proto/agents/v1/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/daemon-publish.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'cmd/butter-daemon/**'
      - 'pkg/proto/agents/v1/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/daemon-publish.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-daemon

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Scheduled (default branch) -> `nightly`
      # Push to main               -> `main`
      # Push to other branches     -> `nightly` (shared; last push wins)
      # Push to vX.Y.Z             -> `X.Y.Z`, `X.Y`, `X`, `latest`
      # PR                         -> `pr-<n>` (built only, not pushed)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,pattern=nightly
            type=ref,event=branch,enable={{is_default_branch}}
            type=raw,value=nightly,enable=${{ github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name != github.event.repository.default_branch }}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          file: ./cmd/butter-daemon/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=daemon
          cache-to: type=gha,mode=max,scope=daemon

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
