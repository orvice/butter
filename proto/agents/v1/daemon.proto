syntax = "proto3";

package agents.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "go.orx.me/apps/butter/pkg/proto/agents/v1;agentsv1";

// DaemonInfo is sent by the daemon client as the first message on the
// Connect stream to register itself with the server.
message DaemonInfo {
  // Runtime this daemon connection serves. The server derives the
  // authoritative value from the daemon token and overwrites any client value.
  // @gotags: json:"daemon_runtime_id,omitempty" yaml:"daemon_runtime_id,omitempty"
  string daemon_runtime_id = 1;

  // Human-readable name for this daemon.
  // @gotags: json:"name,omitempty" yaml:"name,omitempty"
  string name = 2;

  // ACP runtimes supported by this daemon binary. In v1 this is fixed to
  // ["opencode", "codex"] by the client.
  // @gotags: json:"acp_runtimes,omitempty" yaml:"acp_runtimes,omitempty"
  repeated string acp_runtimes = 3;

  // Routing labels (reserved for future use; not used for selection in Phase 1).
  // @gotags: json:"labels,omitempty" yaml:"labels,omitempty"
  map<string, string> labels = 4;

  // Semantic version of the daemon client binary (e.g. "v1.4.2").
  // @gotags: json:"version,omitempty" yaml:"version,omitempty"
  string version = 5;

  // Operating system identifier (e.g. "linux-amd64", "darwin-arm64").
  // @gotags: json:"os,omitempty" yaml:"os,omitempty"
  string os = 6;

  // Optional executor names the daemon will use. Surfaced to the dashboard for
  // diagnostics. ACP runtime remains the routing primitive.
  // @gotags: json:"executors,omitempty" yaml:"executors,omitempty"
  repeated string executors = 7;

  // Workspace this runtime belongs to. The server derives the authoritative
  // workspace from the daemon credential and rejects mismatches.
  // @gotags: json:"workspace_id,omitempty" yaml:"workspace_id,omitempty"
  string workspace_id = 8;
}

// DaemonTask is a task assignment sent from server to daemon.
message DaemonTask {
  // @gotags: json:"task_id,omitempty" yaml:"task_id,omitempty"
  string task_id = 1;

  // The agent name on the server side that triggered this task.
  // @gotags: json:"agent_name,omitempty" yaml:"agent_name,omitempty"
  string agent_name = 2;

  // User input text to execute.
  // @gotags: json:"input,omitempty" yaml:"input,omitempty"
  string input = 3;

  // @gotags: json:"session_id,omitempty" yaml:"session_id,omitempty"
  string session_id = 4;

  // @gotags: json:"user_id,omitempty" yaml:"user_id,omitempty"
  string user_id = 5;

  // @gotags: json:"metadata,omitempty" yaml:"metadata,omitempty"
  map<string, string> metadata = 6;

  reserved 7;
  reserved "capability";

  // Workspace that owns this task.
  // @gotags: json:"workspace_id,omitempty" yaml:"workspace_id,omitempty"
  string workspace_id = 8;

  // Runtime that should execute this task.
  // @gotags: json:"daemon_runtime_id,omitempty" yaml:"daemon_runtime_id,omitempty"
  string daemon_runtime_id = 9;

  // ACP runtime selected by the daemon-backed remote agent, e.g. "opencode"
  // or "codex".
  // @gotags: json:"acp_runtime,omitempty" yaml:"acp_runtime,omitempty"
  string acp_runtime = 10;

  // Working directory for this invocation. The first implementation generates
  // this under /tmp from workspace + session identity.
  // @gotags: json:"work_dir,omitempty" yaml:"work_dir,omitempty"
  string work_dir = 11;
}

// DaemonTaskUpdate is sent from daemon to server to report task progress or results.
message DaemonTaskUpdate {
  // @gotags: json:"task_id,omitempty" yaml:"task_id,omitempty"
  string task_id = 1;

  // @gotags: json:"status,omitempty" yaml:"status,omitempty"
  DaemonTaskStatus status = 2;

  // Partial or final output text.
  // @gotags: json:"output,omitempty" yaml:"output,omitempty"
  string output = 3;

  // Error message (populated when status is FAILED).
  // @gotags: json:"error,omitempty" yaml:"error,omitempty"
  string error = 4;

  // @gotags: json:"timestamp,omitempty" yaml:"timestamp,omitempty"
  google.protobuf.Timestamp timestamp = 5;

  // Optional short label for the current step (e.g. "Compiling dependencies").
  // @gotags: json:"current_step,omitempty" yaml:"current_step,omitempty"
  string current_step = 6;

  // Optional progress percentage in [0, 100]. 0 when unknown.
  // @gotags: json:"progress,omitempty" yaml:"progress,omitempty"
  int32 progress = 7;
}

// DaemonTaskStatus tracks the lifecycle of a daemon task.
enum DaemonTaskStatus {
  DAEMON_TASK_STATUS_UNSPECIFIED = 0;
  DAEMON_TASK_STATUS_ACCEPTED = 1;
  DAEMON_TASK_STATUS_RUNNING = 2;
  DAEMON_TASK_STATUS_COMPLETED = 3;
  DAEMON_TASK_STATUS_FAILED = 4;
  DAEMON_TASK_STATUS_CANCELLED = 5;
}

// CancelTask requests cancellation of a running task.
message CancelTask {
  // @gotags: json:"task_id,omitempty" yaml:"task_id,omitempty"
  string task_id = 1;
}

// DaemonConnectorService is the gRPC service for daemon long-lived connections.
service DaemonConnectorService {
  // Connect establishes a bidirectional stream. The daemon sends a register
  // message first, then task updates. The server sends task assignments and
  // cancellation requests.
  rpc Connect(stream ConnectRequest) returns (stream ConnectResponse);
}

// ConnectRequest is the client-to-server stream message for DaemonConnectorService.Connect.
message ConnectRequest {
  oneof message {
    // First message must be a register.
    DaemonInfo register = 1;
    // Subsequent messages are task updates.
    DaemonTaskUpdate task_update = 2;
    // Heartbeat keeps long-lived streams active through proxies.
    google.protobuf.Empty heartbeat = 3;
  }
}

// ConnectResponse is the server-to-client stream message for DaemonConnectorService.Connect.
message ConnectResponse {
  oneof message {
    // Task assignment.
    DaemonTask task = 1;
    // Cancel a running task.
    CancelTask cancel = 2;
    // Heartbeat keeps long-lived streams active through proxies.
    google.protobuf.Empty heartbeat = 3;
  }
}
