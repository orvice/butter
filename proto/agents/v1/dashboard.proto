syntax = "proto3";

package agents.v1;

import "agents/v1/agent.proto";
import "agents/v1/agentchannel.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "go.orx.me/apps/butter/pkg/proto/agents/v1;agentsv1";

// =============================================================================
// DashboardService — aggregated read-only metrics for the operator dashboard.
// =============================================================================

service DashboardService {
  // GetOverview returns aggregate counts, component health and the latest
  // daemon handshake for the dashboard Overview screen.
  rpc GetOverview(GetOverviewRequest) returns (GetOverviewResponse);
  // GetActivityFeed returns the most recent invocation activity, oldest event
  // first stripped, suitable for the dashboard Activity Feed widget.
  rpc GetActivityFeed(GetActivityFeedRequest) returns (GetActivityFeedResponse);
  // GetCronExecutionTimeseries aggregates cron_executions into time buckets,
  // suitable for the Overview screen "Cron Executions" chart.
  rpc GetCronExecutionTimeseries(GetCronExecutionTimeseriesRequest) returns (GetCronExecutionTimeseriesResponse);
}

message GetCronExecutionTimeseriesRequest {
  enum Range {
    RANGE_UNSPECIFIED = 0;
    RANGE_1D = 1;
    RANGE_7D = 2;
    RANGE_30D = 3;
  }
  Range range = 1;
  // Optional: filter by job name.
  string job_name = 2;
}

message GetCronExecutionTimeseriesResponse {
  // Oldest bucket first.
  repeated CronExecutionBucket buckets = 1;
}

message CronExecutionBucket {
  google.protobuf.Timestamp start = 1;
  int32 success = 2;
  int32 error = 3;
}

message GetActivityFeedRequest {
  // Maximum records to return. Defaults to 20, capped at 200.
  int32 limit = 1;
  // Pagination token from a previous response.
  string page_token = 2;
}

message GetActivityFeedResponse {
  repeated ActivityEvent events = 1;
  string next_page_token = 2;
}

message ActivityEvent {
  string id = 1;
  // Kind of event: invocation | execution_completed | error.
  string kind = 2;
  // Agent / cron job / webhook id that produced the event.
  string actor = 3;
  // Short human-readable message.
  string message = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message GetOverviewRequest {
  // Optional environment label echoed back to the client. The server does not
  // currently filter on this field.
  string environment = 1;
}

message GetOverviewResponse {
  OverviewCounts counts = 1;
  HealthSummary health = 2;
  DaemonHandshake latest_daemon_handshake = 3;
}

message OverviewCounts {
  int32 active_agents = 1;
  int32 mcp_servers = 2;
  int32 connected_daemons = 3;
  int32 remote_agents = 4;
  int32 channels = 5;
  int32 cron_jobs = 6;
  // Total ADK sessions persisted in MongoDB. 0 if the session backend does
  // not implement counting.
  int32 active_sessions = 7;
}

message HealthSummary {
  ComponentHealth mongodb = 1;
  ComponentHealth redis = 2;
  ComponentHealth runner = 3;
}

message ComponentHealth {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_HEALTHY = 1;
    STATUS_DEGRADED = 2;
    STATUS_DOWN = 3;
  }
  Status status = 1;
  string detail = 2;
  google.protobuf.Timestamp checked_at = 3;
  int64 latency_ms = 4;
}

message DaemonHandshake {
  string daemon_id = 1;
  string name = 2;
  repeated string capabilities = 3;
  google.protobuf.Timestamp connected_at = 4;
  // OS identifier reported by the daemon at handshake (e.g. "linux-amd64").
  string os = 5;
}

// =============================================================================
// DaemonService — read-only views over the daemon registry for the
// Execution & Daemon Monitoring screen.
// =============================================================================

service DaemonService {
  rpc ListDaemons(ListDaemonsRequest) returns (ListDaemonsResponse);
  rpc GetDaemon(GetDaemonRequest) returns (GetDaemonResponse);
  // CancelDaemonTask requests cancellation of a running task on any connected
  // daemon. Returns NotFound if no online daemon is tracking the task.
  rpc CancelDaemonTask(CancelDaemonTaskRequest) returns (CancelDaemonTaskResponse);
  // ListDaemonTasks returns all tasks currently in flight on connected daemons.
  rpc ListDaemonTasks(ListDaemonTasksRequest) returns (ListDaemonTasksResponse);
  // GetBridgeDiagnostics returns router-side resource usage and a recent
  // bridge-latency sample series, suitable for the Bridge Diagnostics panel.
  rpc GetBridgeDiagnostics(GetBridgeDiagnosticsRequest) returns (GetBridgeDiagnosticsResponse);
}

message GetBridgeDiagnosticsRequest {
  // Reserved for future windowing (e.g. last 1h / 24h). Currently ignored —
  // the server returns a rolling in-memory sample window.
  google.protobuf.Duration window = 1;
}

message GetBridgeDiagnosticsResponse {
  BridgeDiagnostics diagnostics = 1;
}

message BridgeDiagnostics {
  // Process-level metrics for the butter server (the "router").
  double cpu_percent = 1;
  int64 memory_used_bytes = 2;
  int64 memory_limit_bytes = 3;
  int32 goroutines = 4;
  google.protobuf.Timestamp checked_at = 5;
  // Rolling samples of bridge invocation latency (oldest first).
  repeated LatencyPoint latency = 6;
}

message LatencyPoint {
  google.protobuf.Timestamp timestamp = 1;
  int64 latency_ms = 2;
}

message ListDaemonsRequest {}

message ListDaemonsResponse {
  repeated DaemonStatus daemons = 1;
}

message GetDaemonRequest {
  string daemon_id = 1;
}

message GetDaemonResponse {
  DaemonStatus daemon = 1;
}

message CancelDaemonTaskRequest {
  // Task id to cancel.
  string task_id = 1;
  // Optional daemon id hint; if empty the registry is scanned.
  string daemon_id = 2;
}

message CancelDaemonTaskResponse {
  // Daemon id that received the cancel signal.
  string daemon_id = 1;
}

message ListDaemonTasksRequest {
  // Optional: only return tasks served by this daemon id.
  string daemon_id = 1;
}

message ListDaemonTasksResponse {
  repeated DaemonTaskInFlight tasks = 1;
}

message DaemonTaskInFlight {
  string task_id = 1;
  string daemon_id = 2;
  string daemon_name = 3;
  // Capability used to dispatch this task.
  string capability = 4;
  // When the task was dispatched to the daemon.
  google.protobuf.Timestamp started_at = 5;
  // Wallclock elapsed since started_at.
  google.protobuf.Duration elapsed = 6;
  // Latest progress label reported by the daemon, if any.
  string current_step = 7;
  // Latest progress percentage in [0, 100]; 0 when unknown.
  int32 progress = 8;
  // Agent name that triggered the dispatch.
  string agent_name = 9;
}

message DaemonStatus {
  string daemon_id = 1;
  string name = 2;
  repeated string capabilities = 3;
  map<string, string> labels = 4;

  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_ONLINE = 1;
    STATE_IDLE = 2;
    STATE_OFFLINE = 3;
  }
  State state = 5;

  google.protobuf.Timestamp connected_at = 6;
  google.protobuf.Duration uptime = 7;
  int32 active_tasks = 8;

  // Reported by the daemon at handshake.
  string version = 9;
  string os = 10;
  repeated string executors = 11;
  // Captured by the server from the gRPC peer (best-effort, may be empty).
  string remote_addr = 12;
}

// =============================================================================
// MCPServerService status extension (registered in agent_service.proto).
// =============================================================================

message GetMCPServerStatusRequest {
  string id = 1;
}

message GetMCPServerStatusResponse {
  MCPServerStatus status = 1;
}

message GetRemoteAgentStatusRequest {
  string id = 1;
}

message GetRemoteAgentStatusResponse {
  RemoteAgentStatus status = 1;
}

message RemoteAgentStatus {
  string id = 1;
  RemoteAgentProtocol protocol = 2;

  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_CONFIGURED = 1;
    STATE_ACTIVE = 2;
    STATE_IDLE = 3;
    STATE_UNREACHABLE = 4;
    STATE_ERROR = 5;
  }
  State state = 3;

  string detail = 4;
  // For DAEMON protocol only: id of the daemon currently serving the
  // configured daemon_capability, if one is online.
  string serving_daemon_id = 5;
  google.protobuf.Timestamp checked_at = 6;
  int64 latency_ms = 7;
}

message ListMCPToolsRequest {
  // Optional: when set, list tools for this server only.
  string server_id = 1;
}

message ListMCPToolsResponse {
  repeated MCPTool tools = 1;
  // Servers that failed probing, keyed by id → error.
  map<string, string> errors = 2;
}

message MCPTool {
  string name = 1;
  string description = 2;
  string server_id = 3;
  string server_name = 4;
  // True if not filtered out by the server's tool_filter whitelist.
  bool allowed = 5;
}

message MCPServerStatus {
  string id = 1;
  string name = 2;

  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_CONFIGURED = 1;
    STATE_CONNECTED = 2;
    STATE_DISCONNECTED = 3;
    STATE_ERROR = 4;
  }
  State state = 3;

  // tool_count is taken from the configured tool_filter when present;
  // a live probe count will be added when MCP probing is implemented.
  int32 tool_count = 4;
  string detail = 5;
  google.protobuf.Timestamp checked_at = 6;
}

// =============================================================================
// ChannelService status extension (registered in agent_service.proto).
// =============================================================================

message GetChannelStatusRequest {
  string name = 1;
}

message GetChannelStatusResponse {
  ChannelStatus status = 1;
}

message ChannelStatus {
  string name = 1;
  AgentChannelPlatform platform = 2;

  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_LIVE = 1;
    STATE_PAUSED = 2;
    STATE_DISABLED = 3;
    STATE_ERROR = 4;
  }
  State state = 3;

  google.protobuf.Timestamp last_poll_at = 4;
  string detail = 5;
}
