# Butter demo configuration
# Copy to config/butter.yaml and set BUTTERFLY_CONFIG_FILE_PATH=config/butter.yaml

http:
  greeting: "Hello from Butter!"

# Optional shared API token. Kept for daemon/API compatibility. Dashboard login uses auth below.
# Authorization: Bearer <token>
apiToken: ""

# Dashboard user authentication. On first startup with an empty users collection,
# Butter creates this initial admin user. Change the password before deploying.
auth:
  initial_admin_username: "admin"
  initial_admin_password: "change-me"
  session_ttl: 168h
  # Third-party OAuth login providers. Each entry requires client_id and
  # client_secret; providers with empty credentials are skipped at startup
  # and are not exposed via ListOAuthProviders. redirect_url must match the
  # callback URL registered with the provider's OAuth app.
  oauth_providers: {}
  #   github:
  #     client_id: "${GITHUB_OAUTH_CLIENT_ID}"
  #     client_secret: "${GITHUB_OAUTH_CLIENT_SECRET}"
  #     redirect_url: "https://dashboard.example.com/auth/oauth/callback/github"
  #     scopes: ["read:user", "user:email"]
  #     display_name: "GitHub"

# MongoDB for ADK session persistence, dashboard users, and runtime repositories
mongo_uri: "mongodb://localhost:27017"
mongo_db: "butter"
storage_backend: "mongo"

# Redis for dashboard auth sessions and agent selection persistence
redis_addr: "localhost:6379"
redis_password: ""

# Object storage (S3-compatible). Managed by butterfly core — see
# https://butterfly.orz.ee/stores/s3.html for the full schema.
# Each key under store.s3 registers a named client retrievable via
# s3.GetClient("<name>") / s3.GetBucket("<name>").
#
# store:
#   s3:
#     assets:
#       endpoint: "s3.amazonaws.com"
#       access_key_id: "AKIA..."
#       secret_access_key: "..."
#       region: "us-east-1"
#       bucket: "butter-assets"
#       use_ssl: true
#       use_path_style: false
#     # MinIO example:
#     # local:
#     #   endpoint: "localhost:9000"
#     #   ak: "minioadmin"
#     #   sk: "minioadmin"
#     #   region: "us-east-1"
#     #   bucket: "butter-local"
#     #   use_ssl: false
#     #   use_path_style: true

# Static asset / avatar uploads. Set static.s3_bucket to one of the keys
# defined under store.s3 above to enable the upload endpoints
# (POST /api/uploads/avatar, POST /api/uploads/static).
# CDN-aware URLs are returned to clients when cdn_base_url is set.
static:
  s3_bucket: ""              # e.g. "assets" — must match a store.s3 key
  key_prefix: "butter"       # object key prefix (optional)
  cdn_base_url: ""           # e.g. "https://cdn.example.com"
  public_base_url: ""        # fallback when no CDN (e.g. https://s3.amazonaws.com/butter-assets)
  max_upload_bytes: 5242880  # 5 MiB; 0 = use default

# ADK artifact service. Artifacts are per-(app, user, session) blobs produced
# or consumed by agents (e.g. a tool returning a generated image). Keep this
# bucket PRIVATE — unlike static assets, artifacts are not served from a CDN
# and may contain user-specific or model-generated content.
#
# Set artifact.s3_bucket to one of the keys defined under store.s3 above to
# enable artifact persistence. Leave empty to disable (ADK runs without an
# artifact backend — agent tools that load/save artifacts will no-op or fail).
artifact:
  s3_bucket: ""              # e.g. "artifacts" — must match a store.s3 key
  key_prefix: "artifacts"    # object key prefix (optional)

# Agent Files. Workspace-owned text file spaces that agents can mount through
# config.file_mounts. Contents use S3 when configured; otherwise they are kept
# in memory for local development.
agent_files:
  s3_bucket: ""              # e.g. "agent-files" — must match a store.s3 key
  key_prefix: "agent-files"
  max_file_bytes: 262144     # 256 KiB; 0 = use default

# OAuth2-protected MCP servers. Required only when you connect MCP servers
# with auth.type = MCP_SERVER_AUTH_TYPE_OAUTH2. Generate a unique 32-byte
# encryption key for production; the value below is a development placeholder.
mcp_oauth:
  callback_base_url: "http://localhost:8080"
  dashboard_base_url: "http://localhost:5173"
  encryption_key: "0123456789abcdef0123456789abcdef"
  allow_insecure_http: true

# Langfuse observability (optional — disabled when keys are empty)
langfuse:
  publicKey: ""       # LANGFUSE_PUBLIC_KEY
  secretKey: ""       # LANGFUSE_SECRET_KEY
  host: ""            # defaults to https://cloud.langfuse.com
  # environment: ""   # e.g. "production", "staging"
  # release: ""       # app version tag
  # serviceName: ""   # OTel service name, defaults to "langfuse-adk"

# Model provider mappings
# Maps model names to provider backends. If a model isn't listed here, Gemini is used as default.
model_providers:
  - name: gemini
    type: gemini
    # api_key: ""  # Uses GOOGLE_API_KEY env var by default
    models:
      - name: "gemini-2.5-flash"
        alias: "flash"
      - name: "gemini-2.5-pro"
        alias: "pro"

  - name: openai
    type: openai
    api_key: ""  # Set via env var or config
    base_url: "https://api.openai.com/v1"
    models:
      - name: "gpt-4o"
        alias: "4o"
      - name: "gpt-4o-mini"
        alias: "4o-mini"

  # Example: Ollama (OpenAI-compatible)
  # - name: ollama
  #   type: openai
  #   base_url: "http://localhost:11434/v1"
  #   models:
  #     - name: "qwen3:8b"
  #       alias: "qwen"

# Shared MCP server definitions
# Define MCP servers here and reference them by ID in agent configs via mcp_server_ids.
mcp_server_configs: []
  # Streamable HTTP transport example
  # - id: "search-api"
  #   name: "Search API"
  #   transport: 2  # MCP_SERVER_TRANSPORT_STREAMABLE_HTTP
  #   url: "https://mcp.example.com/search"
  #   headers:
  #     Authorization: "Bearer YOUR_TOKEN"
  #   tool_filter: ["web_search", "image_search"]

  # SSE transport example
  # - id: "sse-tools"
  #   name: "SSE Tools"
  #   transport: 3  # MCP_SERVER_TRANSPORT_SSE
  #   url: "https://mcp.example.com/sse"

# Remote agent definitions (A2A protocol)
# Define remote agents here and reference them by ID in agent configs via remote_agent_ids.
remote_agents: []
  # - id: "summarizer-remote"
  #   name: "Remote Summarizer"
  #   url: "https://agents.example.com/summarizer"
  #   protocol: 1  # REMOTE_AGENT_PROTOCOL_A2A

# Cron jobs are managed via API (stored in MongoDB).
# Use the CronJobService API to create/update/delete cron jobs:
#   POST /api/agents.v1.CronJobService/CreateCronJob
#   POST /api/agents.v1.CronJobService/ListCronJobs
#   POST /api/agents.v1.CronJobService/ListCronExecutions

# Agent definitions
agents:
  - name: assistant
    description: "A general-purpose assistant powered by Gemini"
    type: 1  # AGENT_TYPE_LLM
    config:
      model: "flash"  # alias for gemini-2.5-flash
      instruction: "You are a helpful assistant. Answer questions clearly and concisely."
      include_contents: 1  # LLM_INCLUDE_CONTENTS_DEFAULT
      # Reference shared MCP servers by ID:
      # mcp_server_ids: ["search-api", "sse-tools"]
      # Mount Agent File spaces by ID:
      # file_mounts:
      #   - space_id: "product-docs"
      #     mount_path: "/docs"
      #     permission: 1  # AGENT_FILE_MOUNT_PERMISSION_READ
      # Or define inline MCP servers:
      # mcp_servers:
      #   - name: "My MCP Server"
      #     transport: 2  # MCP_SERVER_TRANSPORT_STREAMABLE_HTTP
      #     url: "https://mcp.example.com/tools"

  - name: translator
    description: "Translates text between languages"
    type: 1  # AGENT_TYPE_LLM
    config:
      model: "flash"  # alias for gemini-2.5-flash
      instruction: |
        You are a translator. When the user sends text, detect the language
        and translate it to English if it's not English, or to Chinese if it is English.
        Only output the translation, no explanation.

  - name: summarizer
    description: "Summarizes long text into key points"
    type: 1  # AGENT_TYPE_LLM
    config:
      model: "flash"  # alias for gemini-2.5-flash
      instruction: |
        You are a summarizer. When the user sends text, extract the key points
        and return a concise bullet-point summary. Keep it under 5 bullet points.

# Channel bindings
channels:
  - name: my-telegram-bot
    agent_name: assistant  # default agent for this channel
    platform: 1  # AGENT_CHANNEL_PLATFORM_TELEGRAM
    enabled: true
    # model: "pro"  # optional: override agent's model (by alias or name)

    triggers:
      - type: 1  # AGENT_TRIGGER_TYPE_MESSAGE (all text messages)
      - type: 4  # AGENT_TRIGGER_TYPE_PRIVATE_CHAT

    delivery:
      reply_mode: 1  # AGENT_REPLY_MODE_REPLY
      send_typing: true

    session:
      scope: 2  # AGENT_SESSION_SCOPE_CHAT

    telegram:
      bot_token: "YOUR_BOT_TOKEN_HERE"
      # Restrict to specific chats/users (empty = allow all)
      allowed_chat_ids: []
      allowed_user_ids: []
